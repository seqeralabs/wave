wave:
  db:
    uri: "jdbc:postgresql://localhost:5432/changeme"
    user: "changeme"
    password: "changeme"
    schema: "${WAVE_DB_SCHEMA:wave}"
datasources:
  default:
    db-type: postgres
    dialect: POSTGRES
    driver-class-name: org.postgresql.Driver
    url: "${wave.db.uri}"
    username: "${wave.db.user}"
    password: "${wave.db.password}"
    schema: "${wave.db.schema}"
