services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wave
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: wave
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wave"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  wave:
    # Replace with your Wave image registry path
    image: hrma017/wave:1.33.2
    ports:
      - "9090:9090"
    volumes:
      - ./config.yml:/work/config.yml:ro
    environment:
      - MICRONAUT_ENVIRONMENTS=lite,rate-limit,redis,postgres,prometheus
    env_file:
      - wave.env
    working_dir: /work
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      mode: replicated
      # Use 2 replicas with `docker stack deploy` (Swarm mode).
      # For `docker compose up`, use 1 to avoid port conflicts.
      replicas: 1
      resources:
        limits:
          memory: 4G
          cpus: '1.0'
        reservations:
          memory: 2G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  db-data:
