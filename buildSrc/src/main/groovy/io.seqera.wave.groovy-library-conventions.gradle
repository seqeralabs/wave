/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    // Apply the common convention plugin for shared build configuration between library and application projects.
    id 'io.seqera.wave.groovy-common-conventions'

    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    // Micronaut minimal lib
    // https://micronaut-projects.github.io/micronaut-gradle-plugin/3.7.x/
    id "io.micronaut.minimal.library"
}

micronaut {
    runtime("netty")
    testRuntime("spock2")
    processing {
        incremental(true)
    }
}

// Profile B: this library runs inside a Micronaut app on the Java 25 service runtime
// (Micronaut 5 requires it), so it targets Java 25 rather than the Java 17 default.
// --release is dropped since it cannot coexist with -source/-target on the same javac
// task. See seqeralabs/adr#51.
tasks.withType(JavaCompile).configureEach {
    options.release = null
    sourceCompatibility = '25'
    targetCompatibility = '25'
}
tasks.withType(GroovyCompile).configureEach {
    sourceCompatibility = '25'
    targetCompatibility = '25'
}

group = 'io.seqera'
