/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    // Apply the groovy Plugin to add support for Groovy.
    id 'groovy'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

java {
    // these settings apply to all jvm tooling, including groovy
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    // Compile target is set by the applying convention: Profile A (--release 17) via
    // io.seqera.wave.java-library-conventions for plain libraries, or Profile B
    // (source/target 25) for Micronaut modules (the Wave app / groovy-library).
    // See seqeralabs/adr#51.
}

group = 'io.seqera'
